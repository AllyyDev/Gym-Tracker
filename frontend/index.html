<!doctype html>

<html class="dark" lang="de">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=Hanken+Grotesk:wght@400;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="tailwind-config.js"></script>
  </head>
  <body
    class="bg-background text-on-background min-h-screen flex flex-col kinetic-gradient pt-[72px]"
  >
    <header
      class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center w-full px-margin-mobile py-sm md:px-margin-desktop bg-background border-b border-surface-variant"
    >
      <div class="flex items-center gap-base">
        <span
          class="material-symbols-outlined text-primary-fixed font-bold text-headline-md"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >fitness_center</span
        >
        <h1
          class="font-display-lg text-display-lg font-extrabold text-primary tracking-tighter uppercase"
        >
          Gym Tracker
        </h1>
      </div>
      <div class="flex items-center gap-md">
        <button
          class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity"
        >
          help_outline
        </button>
      </div>
    </header>

    <main
      class="flex-grow flex items-start justify-center px-margin-mobile py-xl relative min-h-[120vh]"
    >
      <div
        class="absolute inset-0 z-0 opacity-20 pointer-events-none grayscale contrast-125 overflow-hidden"
      >
        <video
          class="w-full h-full object-cover"
          autoplay
          muted
          loop
          playsinline
        >
          <source src="./videoplayback.mp4" type="video/mp4" />
          Dein Browser unterstützt kein Video.
        </video>
      </div>

      <div class="fixed top-[72px] left-0 w-full h-2 bg-surface-container z-40">
        <div
          class="h-full bg-primary-container w-1/3 transition-all duration-700 ease-out"
        ></div>
      </div>

      <section
        class="relative z-10 w-full max-w-xl animate-in fade-in slide-in-from-bottom-8 duration-700"
      >
        <div
          class="bg-surface-container border border-surface-variant p-md md:p-lg rounded-xl form-glow backdrop-blur-md bg-opacity-90"
        >
          <header class="mb-lg">
            <h2 class="font-headline-lg text-headline-lg text-primary mb-xs">
              Profil erstellen
            </h2>
            <p class="font-body-md text-on-surface-variant">
              Personalisiere deine Erfahrung für optimale Ergebnisse.
            </p>
          </header>
          <form class="space-y-gutter">
            <div class="space-y-xs">
              <label
                class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider"
                >Täglicher Kalorienverbrauch</label
              >
              <div class="relative group">
                <input
                  class="w-full bg-surface-container-high border-2 border-surface-variant rounded-lg px-md py-sm text-body-lg text-primary outline-none focus:border-primary-container input-focus-effect transition-all placeholder:text-surface-variant"
                  placeholder="z.B. 2500"
                  type="number"
                />
                <span
                  class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant font-label-md"
                  >kcal</span
                >
              </div>
            </div>
            <div class="grid grid-cols-2 gap-gutter">
              <div class="space-y-xs">
                <label
                  class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider"
                  >Größe (cm)</label
                >
                <input
                  class="w-full bg-surface-container-high border-2 border-surface-variant rounded-lg px-md py-sm text-body-lg text-primary outline-none focus:border-primary-container transition-all placeholder:text-surface-variant"
                  placeholder="180"
                  type="number"
                />
              </div>
              <div class="space-y-xs">
                <label
                  class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider"
                  >Gewicht (kg)</label
                >
                <input
                  class="w-full bg-surface-container-high border-2 border-surface-variant rounded-lg px-md py-sm text-body-lg text-primary outline-none focus:border-primary-container transition-all placeholder:text-surface-variant"
                  placeholder="85"
                  type="number"
                />
              </div>
            </div>

            <div class="space-y-xs">
              <label
                class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider"
                >Geschlecht</label
              >
              <div class="grid grid-cols-3 gap-xs">
                <button
                  class="gender-btn py-sm px-base border-2 border-surface-variant rounded-lg font-label-md text-on-surface hover:border-outline transition-all active:scale-95"
                  type="button"
                >
                  Männlich
                </button>
                <button
                  class="gender-btn py-sm px-base border-2 border-primary-container bg-primary-container text-on-primary-container rounded-lg font-label-md transition-all active:scale-95"
                  type="button"
                >
                  Weiblich
                </button>
                <button
                  class="gender-btn py-sm px-base border-2 border-surface-variant rounded-lg font-label-md text-on-surface hover:border-outline transition-all active:scale-95"
                  type="button"
                >
                  Divers
                </button>
              </div>
            </div>
            <div class="space-y-xs">
              <label
                class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider"
                >Zielgewicht (kg)</label
              >
              <input
                class="w-full bg-surface-container-high border-2 border-surface-variant rounded-lg px-md py-sm text-body-lg text-primary outline-none focus:border-primary-container transition-all placeholder:text-surface-variant"
                placeholder="80"
                type="number"
              />
            </div>
            <div class="pt-md">
              <button
                class="w-full bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md py-md rounded-full shadow-[0_0_20px_-5px_#c3f400] hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm"
                type="submit"
              >
                Profil erstellen
                <span class="material-symbols-outlined">arrow_forward</span>
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
